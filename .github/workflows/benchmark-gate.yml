name: Benchmark Regression Gate
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # 每周一凌晨2点运行

jobs:
  benchmark-regression:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: src-python/requirements.txt

      - name: Install dependencies
        working-directory: src-python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-benchmark

      - name: Download baseline benchmark (if exists)
        uses: actions/cache/restore@v4
        with:
          path: src-python/benchmark-baseline.json
          key: benchmark-baseline-${{ runner.os }}
          restore-keys: |
            benchmark-baseline-
        continue-on-error: true

      - name: Run benchmark suite
        working-directory: src-python
        run: |
          pytest tests/agent/test_benchmark_runner.py -v \
            --benchmark-only \
            --benchmark-save=benchmark \
            --benchmark-save-data \
            --benchmark-json=benchmark-results.json

      - name: Compare against baseline
        working-directory: src-python
        run: |
          python -c "
          import json
          from pathlib import Path
          import sys

          path = Path('benchmark-results.json')
          if not path.exists():
              print('ERROR: benchmark-results.json not found')
              sys.exit(1)

          with path.open('r', encoding='utf-8') as f:
              results = json.load(f)

          benches = results.get('benchmarks', [])
          if not benches:
              print('ERROR: no benchmark samples produced')
              sys.exit(1)

          print('Benchmark results generated successfully')
          print(f'Total benchmarks: {len(benches)}')

          for bench in benches:
              name = bench.get('name', 'unknown')
              mean_ms = float(bench.get('stats', {}).get('mean', 0.0)) * 1000.0
              std_ms = float(bench.get('stats', {}).get('stddev', 0.0)) * 1000.0
              print(f'  {name}: mean={mean_ms:.2f}ms, std={std_ms:.2f}ms')
          "

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: src-python/benchmark-results.json
          retention-days: 30

      - name: Store new baseline (on main branch)
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: src-python/benchmark-baseline.json
          key: benchmark-baseline-${{ runner.os }}-${{ github.sha }}

  benchmark-threshold-check:
    runs-on: ubuntu-22.04
    needs: benchmark-regression

    steps:
      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results

      - name: Check performance thresholds
        run: |
          python -c "
          import json
          from pathlib import Path
          import sys
          
          THRESHOLDS = {
              'test_orchestrator_basic': 5000,  # ms
              'test_planner_rule_based': 1000,
              'test_executor_sequential': 3000,
          }

          path = Path('benchmark-results.json')
          if not path.exists():
              print('ERROR: benchmark-results.json not found')
              sys.exit(1)

          with path.open('r', encoding='utf-8') as f:
              results = json.load(f)

          benches = results.get('benchmarks', [])
          if not benches:
              print('ERROR: no benchmark samples produced')
              sys.exit(1)

          failed = []
          for bench in benches:
              name = bench.get('name', '')
              mean_ms = float(bench.get('stats', {}).get('mean', 0.0)) * 1000.0

              for pattern, threshold in THRESHOLDS.items():
                  if pattern in name and mean_ms > threshold:
                      failed.append(f'{name}: {mean_ms:.1f}ms > {threshold}ms')

          if failed:
              print('Performance regression detected:')
              for f in failed:
                  print(f'  - {f}')
              sys.exit(1)

          print('All benchmarks within thresholds')
          sys.exit(0)
          "

  benchmark-report:
    runs-on: ubuntu-22.04
    needs: [benchmark-regression, benchmark-threshold-check]
    if: always()

    steps:
      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results

      - name: Generate benchmark summary
        run: |
          echo "## Benchmark Summary" >> $GITHUB_STEP_SUMMARY
          echo "Run completed at: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "benchmark-results.json" ]; then
            python -c "
            import json
            with open('benchmark-results.json', 'r') as f:
                results = json.load(f)
            print('| Benchmark | Mean (ms) | Stddev (ms) |')
            print('|-----------|-----------|-------------|')
            for bench in results.get('benchmarks', []):
                name = bench.get('name', 'unknown')
                mean = float(bench.get('stats', {}).get('mean', 0.0)) * 1000.0
                std = float(bench.get('stats', {}).get('stddev', 0.0)) * 1000.0
                print(f'| {name} | {mean:.2f} | {std:.2f} |')
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "No benchmark results available" >> $GITHUB_STEP_SUMMARY
          fi
