name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: src-python/requirements.txt

      - name: Install dependencies
        working-directory: src-python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Lint with ruff
        working-directory: src-python
        run: |
          pip install ruff
          ruff check app/ --output-format=github || true

      - name: Type check with mypy
        working-directory: src-python
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports --no-error-summary || true

      - name: Run backend tests
        working-directory: src-python
        run: |
          pytest tests -v --tb=short \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: src-python/coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend-tests:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Run frontend tests
        run: npx vitest run --coverage

  security-scan:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Bandit security scan
        working-directory: src-python
        run: |
          pip install bandit
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -f txt || true

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            src-python/bandit-report.json
          retention-days: 30
