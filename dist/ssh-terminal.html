<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安御智测</title>
    <link rel="icon" type="image/png" href="./logo.png" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-primary);
            font-family: var(--font-family);
            overflow: hidden;
        }

        #app {
            width: 100vw;
            height: 100vh;
        }

        /* 控制按钮样式 */
        .control-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            -webkit-app-region: no-drag;
        }

        .control-button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .control-button.minimize-btn:hover {
            background: #f39c12;
            color: white;
        }

        .control-button.maximize-btn:hover {
            background: #27ae60;
            color: white;
        }

        .control-button.close-btn:hover {
            background: #e74c3c;
            color: white;
        }

        /* 调整命令建议面板位置到右侧 */
        .command-suggestions-panel {
            left: auto !important;
            right: 20px !important;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateY(-50%) translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }
        }

        .command-suggestions-panel {
            animation: slideInRight 0.2s ease-out !important;
        }
    </style>
  <script type="module" crossorigin src="./assets/ssh-terminal-CYmoYFSu.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/vendor-modules-C0vFD9tN.js">
  <link rel="modulepreload" crossorigin href="./assets/base-BinpoKAV.js">
  <link rel="stylesheet" crossorigin href="./assets/style-CiVM7iuW.css">
</head>
<body>
    <div id="app">
        <!-- SSH终端内容 -->
        <div id="ssh-terminal-content" style="height: 100vh;"></div>
    </div>

</body>
</html>
