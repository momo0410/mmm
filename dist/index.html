<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="./logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>安御智测</title>
  <meta name="description" content="Linux应急响应工具，支持SSH连接、终端操作、文件管理和Docker容器管理" />

  <style>
    /* 防止页面闪烁的基础样式 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #1a1a2e;
      color: #e2e8f0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Loading screen styles */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.6s ease-out;
      overflow: hidden;
    }

    .loading-screen::before,
    .loading-screen::after {
      content: "";
      position: absolute;
      inset: -20%;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 20px 20px, rgba(244, 114, 182, 0.55) 0 3px, transparent 4px),
        radial-gradient(circle at 80px 50px, rgba(125, 211, 252, 0.5) 0 2px, transparent 3px),
        radial-gradient(circle at 140px 90px, rgba(255, 255, 255, 0.32) 0 2px, transparent 3px);
      background-size: 170px 130px;
      animation: loadingPetals 18s linear infinite;
      opacity: 0.42;
    }

    .loading-screen::after {
      animation-duration: 26s;
      animation-direction: reverse;
      transform: rotate(8deg);
      opacity: 0.26;
    }

    .loading-content {
      text-align: center;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    .logo-container {
      width: min(280px, 48vw);
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 18px 34px rgba(0, 0, 0, 0.28));
    }

    .logo-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .app-title {
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 10px;
      background: linear-gradient(45deg, #4cc9f0, #4361ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .loading-bar-container {
      width: 300px;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
      margin: 10px auto;
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4cc9f0, #4361ee);
      transition: width 0.35s ease;
    }

    @keyframes progress {
      0% {
        width: 0%;
      }

      50% {
        width: 70%;
      }

      100% {
        width: 100%;
      }
    }

    .loading-text {
      color: #a9d6e5;
      margin-top: 15px;
      font-size: 1rem;
    }

    .loading-text.primary {
      min-height: 24px;
      color: #e6fbff;
      font-weight: 500;
    }

    .loading-progress-value {
      min-width: 46px;
      margin-top: -8px;
      color: #f8fbff;
      font-size: 0.95rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

    @keyframes loadingPetals {
      0% {
        transform: translate3d(-3%, -2%, 0) rotate(0deg);
      }

      100% {
        transform: translate3d(8%, 10%, 0) rotate(18deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .loading-screen::before,
      .loading-screen::after {
        animation: none;
      }
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
  <script type="module" crossorigin src="./assets/main-XOcg2bfY.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/vendor-modules-C0vFD9tN.js">
  <link rel="modulepreload" crossorigin href="./assets/base-C5rbSlHh.js">
  <link rel="stylesheet" crossorigin href="./assets/style-0sTTIvj3.css">
</head>

<body>
  <div id="app"></div>

  <!-- Initial loading screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-content">
      <div class="logo-container">
        <img src="./logo.png" alt="安御智测 Logo" />
      </div>
      <div class="app-title">安御智测</div>
      <div class="loading-bar-container">
        <div class="loading-bar" id="initial-loading-bar"></div>
      </div>
      <div class="loading-progress-value" id="initial-loading-percent">0%</div>
      <div class="loading-text primary" id="initial-loading-text">正在加载前端资源...</div>
      <div class="loading-text" id="backend-status">请确保Python后端服务已启动</div>
    </div>
  </div>


  <script>
    (() => {
      const bar = document.getElementById('initial-loading-bar');
      const percentText = document.getElementById('initial-loading-percent');
      const loadingText = document.getElementById('initial-loading-text');
      if (!bar || !percentText) return;

      const startedAt = Date.now();
      const expectedMs = 8500;
      const steps = [
        '正在加载前端资源...',
        '正在导入核心 JS 模块，请稍候...',
        '正在初始化界面与交互组件...',
        '正在准备连接管理器...',
        '即将进入工作台...'
      ];
      const timer = window.setInterval(() => {
        const elapsed = Date.now() - startedAt;
        const eased = 1 - Math.pow(1 - Math.min(elapsed / expectedMs, 1), 2);
        const percent = Math.min(96, Math.max(8, Math.round(eased * 96)));
        const stepIndex = Math.min(steps.length - 1, Math.floor((percent / 100) * steps.length));
        bar.style.width = `${percent}%`;
        percentText.textContent = `${percent}%`;
        if (loadingText) {
          loadingText.textContent = steps[stepIndex];
        }

        if (!document.getElementById('loading-screen')) {
          window.clearInterval(timer);
        }
      }, 180);

      window.__finishInitialLoadingProgress = () => {
        window.clearInterval(timer);
        bar.style.width = '100%';
        percentText.textContent = '100%';
        if (loadingText) {
          loadingText.textContent = '加载完成，正在进入工作台...';
        }
      };
    })();

    // Check if Python backend is accessible
    (async () => {
      try {
        const response = await fetch('http://127.0.0.1:3001/health');
        const data = await response.json();

        if (data.status === 'ok') {
          document.getElementById('backend-status').textContent = 'Python后端连接成功';
          document.getElementById('backend-status').style.color = '#4cc9f0';
        } else {
          document.getElementById('backend-status').textContent = '警告：Python后端连接失败';
          document.getElementById('backend-status').style.color = '#fca5a5';
        }
      } catch (error) {
        console.error('无法连接到Python后端:', error);
        document.getElementById('backend-status').textContent = '错误：无法连接到Python后端';
        document.getElementById('backend-status').style.color = '#fca5a5';
      }
    })();
  </script>
</body>

</html>
